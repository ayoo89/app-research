name: Android Release APK

on:
  push:
    tags:
      - 'v*'           # trigger on version tags: v1.0.0, v1.2.3
  workflow_dispatch:   # allow manual trigger from GitHub UI
    inputs:
      api_url:
        description: 'Backend API URL'
        required: true
        default: 'https://api.yourdomain.com/api/v1'

jobs:
  build:
    name: Build Signed APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install JS dependencies
        working-directory: mobile
        run: npm ci

      - name: Restore keystore from secret
        working-directory: mobile/android/app
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > release.keystore

      - name: Build release APK
        working-directory: mobile/android
        env:
          MYAPP_UPLOAD_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          MYAPP_UPLOAD_KEY_PASSWORD:   ${{ secrets.ANDROID_KEY_PASSWORD }}
          MYAPP_UPLOAD_KEY_ALIAS:      ${{ secrets.ANDROID_KEY_ALIAS }}
          API_BASE_URL: ${{ github.event.inputs.api_url || 'https://api.yourdomain.com/api/v1' }}
        run: |
          ./gradlew assembleRelease \
            -PMYAPP_UPLOAD_STORE_FILE=release.keystore \
            -PMYAPP_UPLOAD_KEY_ALIAS="$MYAPP_UPLOAD_KEY_ALIAS" \
            -PMYAPP_UPLOAD_STORE_PASSWORD="$MYAPP_UPLOAD_STORE_PASSWORD" \
            -PMYAPP_UPLOAD_KEY_PASSWORD="$MYAPP_UPLOAD_KEY_PASSWORD" \
            -PAPI_BASE_URL="$API_BASE_URL" \
            --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ github.ref_name }}
          path: mobile/android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: mobile/android/app/build/outputs/apk/release/app-universal-release.apk
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
