buildscript {
    ext {
        buildToolsVersion = "34.0.0"
        minSdkVersion     = 24
        compileSdkVersion = 34
        targetSdkVersion  = 34
        kotlinVersion     = "1.9.22"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        // AGP 8.3.2 requires Gradle 8.4+ — we use gradle-8.6
        classpath("com.android.tools.build:gradle:8.3.2")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:${kotlinVersion}")
        // NOTE: do NOT add react-native-gradle-plugin here — it is only
        // available via node_modules, not Maven Central. We handle JS
        // bundling with a custom Gradle task instead.
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
        maven { url = "https://www.jitpack.io" }
        // React Native AAR — resolved from node_modules
        maven { url = new File(rootDir, "../node_modules/react-native/android").toURI() }
        maven { url = new File(rootDir, "../node_modules/jsc-android/dist").toURI() }
    }
}
