pluginManagement {
    // The path is relative to this settings.gradle file (mobile/android/)
    // node_modules is at mobile/node_modules/ → one level up
    includeBuild("../node_modules/@react-native/gradle-plugin")
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id("com.facebook.react.settings")
}

extensions.configure(com.facebook.react.ReactSettingsExtension) { ex ->
    ex.autolinkLibrariesFromCommand()
}

rootProject.name = 'ProductSearchApp'
include ':app'
includeBuild('../node_modules/@react-native/gradle-plugin')
