apply plugin: "com.android.application"
apply plugin: "com.facebook.react"
apply plugin: "kotlin-android"

// Load keystore credentials from keystore.properties (not committed to git)
// Falls back to gradle.properties / environment variables
def keystorePropertiesFile = rootProject.file("keystore.properties")
def keystoreProperties = new Properties()
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

def getKeystoreProperty = { key ->
    return keystoreProperties.getProperty(key)
        ?: System.getenv(key)
        ?: project.findProperty(key)
        ?: ""
}

react {
    /* Hermes JS engine — smaller bundle, faster startup */
    hermesEnabled = true
}

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.productsearch.app"

    defaultConfig {
        applicationId "com.productsearch.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0.0"

        // Inject API URL at build time — override with -PAPI_BASE_URL=https://... 
        def apiBaseUrl = project.findProperty("API_BASE_URL")
            ?: System.getenv("API_BASE_URL")
            ?: "https://api.yourdomain.com/api/v1"
        buildConfigField "String", "API_BASE_URL", "\"${apiBaseUrl}\""

        // ABI splits — produce per-architecture APKs for smaller size
        splits {
            abi {
                reset()
                enable true
                universalApk true   // also produce a fat universal APK
                include "arm64-v8a", "armeabi-v7a", "x86_64"
            }
        }
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        release {
            storeFile file(getKeystoreProperty("MYAPP_UPLOAD_STORE_FILE") ?: "release.keystore")
            storePassword getKeystoreProperty("MYAPP_UPLOAD_STORE_PASSWORD")
            keyAlias getKeystoreProperty("MYAPP_UPLOAD_KEY_ALIAS")
            keyPassword getKeystoreProperty("MYAPP_UPLOAD_KEY_PASSWORD")
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
            applicationIdSuffix ".debug"
            resValue "string", "app_name", "ProductSearch (Dev)"
        }
        release {
            signingConfig signingConfigs.release
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
            resValue "string", "app_name", "ProductSearch"

            // Strip debug logs in release
            buildConfigField "boolean", "DEBUG_LOGS", "false"
        }
    }

    buildFeatures {
        buildConfig true
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    packagingOptions {
        pickFirst '**/libc++_shared.so'
        pickFirst '**/libfbjni.so'
    }
}

dependencies {
    // React Native
    implementation("com.facebook.react:react-android")
    implementation("com.facebook.react:hermes-android")

    // Kotlin
    implementation "org.jetbrains.kotlin:kotlin-stdlib:$rootProject.ext.kotlinVersion"
}
