apply plugin: "com.android.application"

// Load keystore credentials
def keystorePropertiesFile = rootProject.file("keystore.properties")
def keystoreProperties = new Properties()
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

def getKeystoreProp = { key ->
    return keystoreProperties.getProperty(key)
        ?: System.getenv(key)
        ?: project.findProperty(key)
        ?: ""
}

android {
    compileSdkVersion 34
    buildToolsVersion "34.0.0"
    namespace "com.productsearch.app"

    defaultConfig {
        applicationId "com.productsearch.app"
        minSdkVersion 24
        targetSdkVersion 34
        versionCode 1
        versionName "1.0.0"

        def apiBaseUrl = project.findProperty("API_BASE_URL")
            ?: System.getenv("API_BASE_URL")
            ?: "https://api.yourdomain.com/api/v1"
        buildConfigField "String", "API_BASE_URL", "\"${apiBaseUrl}\""
    }

    signingConfigs {
        release {
            storeFile     file(getKeystoreProp("MYAPP_UPLOAD_STORE_FILE") ?: "release.keystore")
            storePassword getKeystoreProp("MYAPP_UPLOAD_STORE_PASSWORD")
            keyAlias      getKeystoreProp("MYAPP_UPLOAD_KEY_ALIAS")
            keyPassword   getKeystoreProp("MYAPP_UPLOAD_KEY_PASSWORD")
        }
    }

    buildTypes {
        release {
            signingConfig   signingConfigs.release
            minifyEnabled   false
            shrinkResources false
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
    }

    buildFeatures {
        buildConfig true
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    packagingOptions {
        pickFirst '**/libc++_shared.so'
        pickFirst '**/libfbjni.so'
    }
}

repositories {
    google()
    mavenCentral()
}

dependencies {
    implementation "com.facebook.react:react-android:0.73.0"
    implementation "com.facebook.react:hermes-android:0.73.0"
}
