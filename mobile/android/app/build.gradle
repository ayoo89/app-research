apply plugin: "com.android.application"
apply plugin: "kotlin-android"

// ── Keystore ──────────────────────────────────────────────────────────────────
def keystorePropertiesFile = rootProject.file("keystore.properties")
def keystoreProperties = new Properties()
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}
def getKeystoreProp = { key ->
    return keystoreProperties.getProperty(key)
        ?: System.getenv(key)
        ?: project.findProperty(key)
        ?: ""
}

// ── Node.js auto-detection ────────────────────────────────────────────────────
def findNodeExecutable = {
    def localProps = new Properties()
    def localPropsFile = rootProject.file("local.properties")
    if (localPropsFile.exists()) {
        localProps.load(new FileInputStream(localPropsFile))
    }
    def nodeDir = localProps.getProperty("nodejs.dir")
    if (nodeDir) {
        def nodeExe = new File(nodeDir, "node.exe")
        if (nodeExe.exists()) return nodeExe.absolutePath
        def nodeUnix = new File(nodeDir, "node")
        if (nodeUnix.exists()) return nodeUnix.absolutePath
    }

    def nodeHome = System.getenv("NODE_HOME")
    if (nodeHome) {
        def nodeExe = new File(nodeHome, "node.exe")
        if (nodeExe.exists()) return nodeExe.absolutePath
    }

    def windowsPaths = [
        "C:\\Program Files\\nodejs\\node.exe",
        "C:\\Program Files (x86)\\nodejs\\node.exe",
        "${System.getenv('APPDATA')}\\nvm\\current\\node.exe",
        "${System.getenv('LOCALAPPDATA')}\\Programs\\nodejs\\node.exe",
    ]
    for (path in windowsPaths) {
        if (path && new File(path).exists()) return path
    }

    def unixPaths = ["/usr/local/bin/node", "/usr/bin/node", "/opt/homebrew/bin/node"]
    for (path in unixPaths) {
        if (new File(path).exists()) return path
    }

    return "node"
}

def nodeExecutable = findNodeExecutable()
logger.lifecycle("Using Node.js: ${nodeExecutable}")

// ── JS Bundle task ────────────────────────────────────────────────────────────
task bundleReleaseJs(type: Exec) {
    def projectRoot = new File(projectDir, "../..").canonicalFile
    def nodeModules = new File(projectRoot, "node_modules")
    def bundleDir   = new File(projectDir, "src/main/assets")
    def bundleFile  = new File(bundleDir, "index.android.bundle")
    def resDir      = new File(projectDir, "src/main/res")

    bundleDir.mkdirs()

    def rnCli    = new File(nodeModules, ".bin/react-native")
    def rnCliCmd = new File(nodeModules, ".bin/react-native.cmd")
    def isWindows = System.getProperty("os.name").toLowerCase().contains("windows")

    if (isWindows && rnCliCmd.exists()) {
        commandLine = ["cmd", "/c",
            rnCliCmd.absolutePath,
            "bundle",
            "--platform", "android",
            "--dev", "false",
            "--entry-file", new File(projectRoot, "index.js").absolutePath,
            "--bundle-output", bundleFile.absolutePath,
            "--assets-dest", resDir.absolutePath,
            "--reset-cache"]
    } else {
        commandLine = [nodeExecutable,
            rnCli.absolutePath,
            "bundle",
            "--platform", "android",
            "--dev", "false",
            "--entry-file", new File(projectRoot, "index.js").absolutePath,
            "--bundle-output", bundleFile.absolutePath,
            "--assets-dest", resDir.absolutePath,
            "--reset-cache"]
    }

    workingDir = projectRoot
}

android {
    compileSdk = 34
    buildToolsVersion = "34.0.0"
    namespace = "com.productsearch.app"

    defaultConfig {
        applicationId = "com.productsearch.app"
        minSdk        = 24
        targetSdk     = 34
        versionCode   = 1
        versionName   = "1.0.0"

        def apiBaseUrl = project.findProperty("API_BASE_URL")
            ?: System.getenv("API_BASE_URL")
            ?: "https://api.yourdomain.com/api/v1"
        buildConfigField("String", "API_BASE_URL", "\"${apiBaseUrl}\"")
    }

    signingConfigs {
        release {
            storeFile     = file(getKeystoreProp("MYAPP_UPLOAD_STORE_FILE") ?: "release.keystore")
            storePassword = getKeystoreProp("MYAPP_UPLOAD_STORE_PASSWORD")
            keyAlias      = getKeystoreProp("MYAPP_UPLOAD_KEY_ALIAS")
            keyPassword   = getKeystoreProp("MYAPP_UPLOAD_KEY_PASSWORD")
        }
    }

    buildTypes {
        debug {
            applicationIdSuffix = ".debug"
        }
        release {
            signingConfig   = signingConfigs.release
            minifyEnabled   = false
            shrinkResources = false
            proguardFiles(getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro")
        }
    }

    buildFeatures {
        buildConfig = true
    }

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    sourceSets {
        main {
            java.srcDirs += ["src/main/kotlin"]
        }
    }

    packagingOptions {
        jniLibs {
            pickFirsts += ['**/libc++_shared.so', '**/libfbjni.so']
            // Extract native libs so the OS can load them directly from disk
            // Required for 16KB page size compatibility on Android 15+
            useLegacyPackaging = true
        }
    }

    applicationVariants.all { variant ->
        if (variant.buildType.name == "release") {
            variant.mergeAssetsProvider.get().dependsOn(bundleReleaseJs)
        }
    }
}

