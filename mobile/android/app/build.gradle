apply plugin: "com.android.application"

// ── Keystore ──────────────────────────────────────────────────────────────────
def keystorePropertiesFile = rootProject.file("keystore.properties")
def keystoreProperties = new Properties()
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}
def getKeystoreProp = { key ->
    return keystoreProperties.getProperty(key)
        ?: System.getenv(key)
        ?: project.findProperty(key)
        ?: ""
}

// ── JS Bundle task (replaces React Native Gradle plugin) ─────────────────────
// Bundles index.js → assets/index.android.bundle using Metro
task bundleReleaseJs(type: Exec) {
    def nodeModules = new File(projectDir, "../../node_modules")
    def metroConfig  = new File(projectDir, "../../metro.config.js")
    def entryFile    = new File(projectDir, "../../index.js")
    def bundleDir    = new File(projectDir, "src/main/assets")
    def bundleFile   = new File(bundleDir, "index.android.bundle")
    def resDir       = new File(projectDir, "src/main/res")

    bundleDir.mkdirs()

    commandLine "node",
        "${nodeModules}/.bin/react-native",
        "bundle",
        "--platform", "android",
        "--dev", "false",
        "--entry-file", entryFile.absolutePath,
        "--bundle-output", bundleFile.absolutePath,
        "--assets-dest", resDir.absolutePath,
        "--config", metroConfig.absolutePath,
        "--reset-cache"
}

android {
    compileSdkVersion 34
    buildToolsVersion "34.0.0"
    namespace "com.productsearch.app"

    defaultConfig {
        applicationId "com.productsearch.app"
        minSdkVersion 24
        targetSdkVersion 34
        versionCode 1
        versionName "1.0.0"

        def apiBaseUrl = project.findProperty("API_BASE_URL")
            ?: System.getenv("API_BASE_URL")
            ?: "https://api.yourdomain.com/api/v1"
        buildConfigField "String", "API_BASE_URL", "\"${apiBaseUrl}\""
    }

    signingConfigs {
        release {
            storeFile     file(getKeystoreProp("MYAPP_UPLOAD_STORE_FILE") ?: "release.keystore")
            storePassword getKeystoreProp("MYAPP_UPLOAD_STORE_PASSWORD")
            keyAlias      getKeystoreProp("MYAPP_UPLOAD_KEY_ALIAS")
            keyPassword   getKeystoreProp("MYAPP_UPLOAD_KEY_PASSWORD")
        }
    }

    buildTypes {
        release {
            signingConfig   signingConfigs.release
            minifyEnabled   false
            shrinkResources false
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
    }

    buildFeatures {
        buildConfig true
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    packagingOptions {
        pickFirst '**/libc++_shared.so'
        pickFirst '**/libfbjni.so'
    }

    // Ensure JS bundle is created before merging assets
    applicationVariants.all { variant ->
        if (variant.buildType.name == "release") {
            variant.mergeAssetsProvider.get().dependsOn(bundleReleaseJs)
        }
    }
}

repositories {
    google()
    mavenCentral()
}

dependencies {
    implementation "com.facebook.react:react-android:0.73.0"
    implementation "com.facebook.react:hermes-android:0.73.0"
}
