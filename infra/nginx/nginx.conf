worker_processes auto;
worker_rlimit_nofile 65535;

events {
  worker_connections 4096;
  use epoll;
  multi_accept on;
}

http {
  # ── Upstream — round-robin across API instances ─────────────────
  upstream api_backend {
    least_conn;
    server api:3000;
    keepalive 64;
  }

  upstream embedding_backend {
    least_conn;
    server embedding-service:8000;
    keepalive 16;
  }

  # ── Rate limiting zones ─────────────────────────────────────────
  limit_req_zone $binary_remote_addr zone=search_limit:10m rate=60r/m;
  limit_req_zone $binary_remote_addr zone=api_limit:10m    rate=300r/m;

  # ── Logging ─────────────────────────────────────────────────────
  log_format json_combined escape=json
    '{"time":"$time_iso8601",'
    '"remote_addr":"$remote_addr",'
    '"method":"$request_method",'
    '"uri":"$request_uri",'
    '"status":$status,'
    '"bytes_sent":$bytes_sent,'
    '"request_time":$request_time,'
    '"upstream_time":"$upstream_response_time",'
    '"correlation_id":"$http_x_correlation_id"}';

  access_log /var/log/nginx/access.log json_combined;
  error_log  /var/log/nginx/error.log  warn;

  # ── Performance ──────────────────────────────────────────────────
  sendfile           on;
  tcp_nopush         on;
  tcp_nodelay        on;
  keepalive_timeout  65;
  gzip               on;
  gzip_types         application/json text/plain;
  gzip_min_length    1024;

  # ── Security headers ─────────────────────────────────────────────
  server_tokens off;
  add_header X-Content-Type-Options  nosniff;
  add_header X-Frame-Options         DENY;
  add_header X-XSS-Protection        "1; mode=block";

  # ── Client body limits ───────────────────────────────────────────
  client_max_body_size    10m;
  client_body_timeout     30s;
  client_header_timeout   10s;

  server {
    listen 80;
    server_name _;

    # Health check (no rate limit)
    location = /health {
      proxy_pass http://api_backend/api/v1/health;
      access_log off;
    }

    # Search endpoints — stricter rate limit
    location ~ ^/api/v1/search {
      limit_req zone=search_limit burst=20 nodelay;
      limit_req_status 429;
      proxy_pass         http://api_backend;
      proxy_http_version 1.1;
      proxy_set_header   Connection        "";
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_read_timeout 10s;
      proxy_send_timeout 10s;
    }

    # All other API routes
    location /api/ {
      limit_req zone=api_limit burst=50 nodelay;
      proxy_pass         http://api_backend;
      proxy_http_version 1.1;
      proxy_set_header   Connection        "";
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_read_timeout 30s;
    }
  }
}
