global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    env: production

# ── Alerting rules ────────────────────────────────────────────────────────────
rule_files:
  - /etc/prometheus/alerts.yml

# ── Scrape targets ────────────────────────────────────────────────────────────
scrape_configs:

  - job_name: api
    static_configs:
      - targets: ['api:3000']
    metrics_path: /api/v1/metrics/prometheus
    scrape_interval: 15s

  - job_name: embedding_service
    static_configs:
      - targets: ['embedding-service:8000']
    metrics_path: /metrics/prometheus
    scrape_interval: 15s

  - job_name: elasticsearch
    static_configs:
      - targets: ['es01:9200']
    metrics_path: /_prometheus/metrics
    scrape_interval: 30s

  - job_name: redis
    static_configs:
      - targets: ['redis-exporter:9121']
    scrape_interval: 15s

  - job_name: postgres
    static_configs:
      - targets: ['postgres-exporter:9187']
    scrape_interval: 15s

  - job_name: nginx
    static_configs:
      - targets: ['nginx-exporter:9113']
    scrape_interval: 15s
