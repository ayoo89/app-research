groups:
  - name: product_search_alerts
    interval: 30s
    rules:

      # ── Latency ────────────────────────────────────────────────────
      - alert: SearchLatencyHigh
        expr: |
          histogram_quantile(0.95,
            rate(search_latency_ms_bucket[5m])
          ) > 1000
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "p95 search latency > 1s"
          description: "p95={{ $value }}ms — check ES KNN num_candidates and Redis hit rate"

      - alert: SearchLatencyCritical
        expr: |
          histogram_quantile(0.99,
            rate(search_latency_ms_bucket[5m])
          ) > 2000
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "p99 search latency > 2s"

      # ── Error rate ─────────────────────────────────────────────────
      - alert: SearchErrorRateHigh
        expr: |
          rate(search_errors_total[5m]) /
          rate(search_requests_total[5m]) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Search error rate > 5%"
          description: "Error rate={{ $value | humanizePercentage }}"

      # ── Circuit breaker ────────────────────────────────────────────
      - alert: EmbeddingCircuitOpen
        expr: increase(search_circuit_tripped_total[5m]) > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "Embedding service circuit breaker tripped"
          description: "Vector search is falling back to text-only"

      # ── Cache ──────────────────────────────────────────────────────
      - alert: CacheHitRateLow
        expr: |
          rate(search_cache_hits_total[10m]) /
          (rate(search_cache_hits_total[10m]) + rate(search_cache_misses_total[10m])) < 0.3
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Cache hit rate < 30%"

      # ── Queue ──────────────────────────────────────────────────────
      - alert: EmbeddingQueueBacklog
        expr: embedding_queue_waiting > 10000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Embedding queue backlog > 10k jobs"

      - alert: EmbeddingFailureRateHigh
        expr: rate(embedding_failed_total[10m]) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Embedding failures > 10/min"
