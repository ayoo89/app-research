apiVersion: v1
kind: ConfigMap
metadata:
  name: product-search-config
data:
  NODE_ENV:            production
  PORT:                "3000"
  DB_PORT:             "5432"
  DB_NAME:             product_search
  DB_POOL_MAX:         "20"
  DB_POOL_MIN:         "2"
  REDIS_PORT:          "6379"
  JWT_EXPIRES_IN:      7d
  CORS_ORIGINS:        "https://yourdomain.com"
---
apiVersion: v1
kind: Secret
metadata:
  name: product-search-secrets
type: Opaque
stringData:
  DB_HOST:               postgres-primary
  DB_REPLICA_HOST:       postgres-replica
  DB_USERNAME:           postgres
  DB_PASSWORD:           CHANGE_ME
  REDIS_HOST:            redis
  JWT_SECRET:            CHANGE_ME_LONG_RANDOM_STRING
  ELASTICSEARCH_URL:     http://elasticsearch:9200
  REDIS_URL:             redis://redis:6379/1
  EMBEDDING_SERVICE_URL: http://embedding-service:8000
  SMTP_HOST:             smtp.gmail.com
  SMTP_PORT:             "587"
  SMTP_USER:             CHANGE_ME
  SMTP_PASS:             CHANGE_ME
