apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-search-api
  labels:
    app: product-search-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: product-search-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0   # zero-downtime deploys
  template:
    metadata:
      labels:
        app: product-search-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path:   "/api/v1/metrics/prometheus"
        prometheus.io/port:   "3000"
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: api
          image: product-search-api:latest
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: product-search-secrets
            - configMapRef:
                name: product-search-config
          resources:
            requests: { cpu: 250m, memory: 256Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ['/bin/sh', '-c', 'sleep 5']  # drain in-flight requests
---
apiVersion: v1
kind: Service
metadata:
  name: product-search-api
spec:
  selector:
    app: product-search-api
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: product-search-api-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: product-search-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
