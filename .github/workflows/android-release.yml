name: Android Release APK

on:
  workflow_dispatch:
    inputs:
      api_url:
        description: 'Backend API URL'
        required: true
        default: 'https://api.yourdomain.com/api/v1'

jobs:
  build:
    name: Build Signed APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install JS dependencies
        working-directory: mobile
        run: npm install --legacy-peer-deps

      - name: Restore keystore from secret
        working-directory: mobile/android/app
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > release.keystore

      - name: Create keystore.properties
        working-directory: mobile/android
        env:
          STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          KEY_PASSWORD:   ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS:      ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          cat > keystore.properties <<EOF
          MYAPP_UPLOAD_STORE_FILE=release.keystore
          MYAPP_UPLOAD_KEY_ALIAS=${KEY_ALIAS}
          MYAPP_UPLOAD_STORE_PASSWORD=${STORE_PASSWORD}
          MYAPP_UPLOAD_KEY_PASSWORD=${KEY_PASSWORD}
          EOF

      - name: Make gradlew executable
        working-directory: mobile/android
        run: chmod +x gradlew

      - name: Build release APK
        working-directory: mobile/android
        env:
          API_BASE_URL: ${{ github.event.inputs.api_url }}
        run: |
          # Ensure node_modules are available for Gradle plugin resolution
          cd .. && npm install --legacy-peer-deps && cd android
          ./gradlew assembleRelease \
            -PAPI_BASE_URL="$API_BASE_URL" \
            --no-daemon \
            --stacktrace

      - name: List APK outputs
        run: find mobile/android/app/build/outputs/apk -name "*.apk" -exec ls -lh {} \;

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: mobile/android/app/build/outputs/apk/release/*.apk
          retention-days: 30
